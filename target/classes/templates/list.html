<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>TODO</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <script src="/static/main.js"></script>
    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
</head>
<body>
<div class="container">
    <h1 th:text="${appName}" style="color: green">Default app name</h1>
    <hr/>
    <div class="content">
        <div class="row article" th:each="post : ${posts}">
            <div class="col-md-10 col-md-offset-1">
                <h3 th:text="${'Пост от ' + post.creationDate}">Пост от 2019.09.08</h3>
            </div>
            <div class="col-md-11 description">
                <p class="description-text" th:text="${post.text}">Text</p>
            </div>
            <div class="col-md-1">
                <button class="btn btn-sm btn-secondary like"
                        th:text="${post.likes + ' ❤'}"
                        th:attr="data-post-id=${post.id}">0 ❤"</button>
            </div>
            <div class="col-md-12">
                <hr/>
            </div>
        </div>
    </div>
</div>



<script>
    window.onload = function() {
        console.log("Найдено кнопок like: " + $(".like").length);

        $(".like").click((e) => {
            console.log("Клик по кнопке");
            var btn = $(e.currentTarget);
            var postId = btn.attr("data-post-id");
            console.log("ID поста: " + postId);

            btn.attr("disabled", "disabled");

            $.post("/post/" + postId + "/like", (data) => {
                console.log("Ответ от сервера: " + data);
                btn.text(data + " ❤");
                btn.removeClass("btn-secondary");
                btn.addClass("btn-danger");
            }).fail(function(xhr, status, error) {
                console.log("Ошибка запроса: " + error);
            });
        });
    };
</script>



</body>

<ul>
    <li th:each="p : ${posts}">
        <p th:text="${p.text}">text</p>
        <p>(лайков <span th:text="${p.likes}">999</span>)</p>
    </li>
</ul>

<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

</html>
